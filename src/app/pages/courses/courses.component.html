<div class="courses-container">
  <h2>📚 Micro-Courses</h2>

  <div class="course-grid">
    <mat-card class="course-card" *ngFor="let course of courses">
      <mat-card-title>{{ course.title }}</mat-card-title>
      <mat-card-subtitle>{{ course.category }}</mat-card-subtitle>
      <mat-card-content>
        <p>{{ course.description }}</p>
        <p><strong>Progress:</strong> {{ course.progress }}%</p>
        <mat-progress-bar mode="determinate" [value]="course.progress"></mat-progress-bar>
      </mat-card-content>
      <mat-card-actions>
        <button mat-raised-button color="primary">Continue</button>
        <button mat-button>Details</button>
      </mat-card-actions>
    </mat-card>
  </div>
</div>
